<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>জীবনেরগল্প</title>
<link rel="stylesheet" href="style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4611477070029703"
     crossorigin="anonymous"></script>
</head>
<body>

<header>
  <div class="eyebrow">গদ্যের একটি জার্নাল</div>
  <a class="site-title-link" href="index.html"><h1 class="site-title">জীবনেরগল্প</h1></a>
  <div class="tagline" id="cat-name">বিভাগ</div>
</header>

<div class="rule ornate">✦</div>

<main>
  <a class="back-link" href="index.html">← সব বিভাগে ফিরে যান</a>
  <div id="entry-list"></div>
</main>

<footer>© ২০২৬ · জীবনেরগল্প · লেখার একটি ঘর</footer>

<script src="data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('cat');
  const category = CATEGORIES.find(c => c.slug === slug);
  const list = document.getElementById('entry-list');

  if (category) {
    document.getElementById('cat-name').textContent = category.name;
    const items = PIECES.filter(p => p.category === slug);

    if (items.length === 0) {
      list.innerHTML = `<div class="empty-note">এই বিভাগে এখনো কোনো লেখা নেই।</div>`;
    } else {
      items.forEach(p => {
        const a = document.createElement('a');
        a.className = 'entry';
        a.href = `piece.html?id=${p.id}`;
        a.innerHTML = `
          <div class="entry-meta">${p.meta}</div>
          <h2 class="entry-title">${p.title}</h2>
          <p class="entry-excerpt">${p.excerpt}</p>
        `;
        list.appendChild(a);
      });
    }
  } else {
    document.getElementById('cat-name').textContent = "বিভাগ খুঁজে পাওয়া যায়নি";
  }
</script>

</body>
</html>
