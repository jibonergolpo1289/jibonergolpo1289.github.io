<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>জীবনেরগল্প — গদ্যের ঠিকানা</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="eyebrow">গদ্যের একটি জার্নাল</div>
  <a class="site-title-link" href="index.html"><h1 class="site-title">জীবনেরগল্প</h1></a>
  <div class="tagline">বিভাগ বেছে নিন, তারপর পড়া শুরু করুন</div>
</header>

<div class="rule ornate">✦</div>

<main>
  <div class="category-grid" id="category-grid"></div>
</main>

<!-- Disclaimer box -->
<div id="disclaimer" style="border:1px solid #ddd; margin:16px 0;">
  <div style="background:#111; color:#fff; font-weight:bold; padding:10px 14px; text-transform:uppercase;">
    <span id="disclaimer-title"></span>
  </div>
  <div style="padding:14px; background:#f7f7f7;">
    <span id="disclaimer-text"></span>
  </div>
</div>

<!-- Load data.js BEFORE this script -->
<script src="data.js"></script>
<script>
  document.getElementById('disclaimer-title').textContent = disclaimerData.title;
  document.getElementById('disclaimer-text').textContent = disclaimerData.message;
</script>
  
<footer>© ২০২৬ · জীবনেরগল্প · লেখার একটি ঘর</footer>

<script src="data.js"></script>
<script>
  const grid = document.getElementById('category-grid');
  CATEGORIES.forEach(cat => {
    const count = PIECES.filter(p => p.category === cat.slug).length;
    const card = document.createElement('a');
    card.className = 'category-card';
    card.href = `category.html?cat=${cat.slug}`;
    card.innerHTML = `
      <div class="category-name">${cat.name}</div>
      <div class="category-count">${count} টি লেখা</div>
    `;
    grid.appendChild(card);
  });
</script>

</body>
</html>
