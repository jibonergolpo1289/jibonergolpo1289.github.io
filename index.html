<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মার্জিনালিয়া — গদ্যের ঠিকানা</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="eyebrow">গদ্যের একটি জার্নাল</div>
  <a class="site-title-link" href="index.html"><h1 class="site-title">মার্জিনালিয়া</h1></a>
  <div class="tagline">বিভাগ বেছে নিন, তারপর পড়া শুরু করুন</div>
</header>

<div class="rule ornate">✦</div>

<main>
  <div class="category-grid" id="category-grid"></div>
</main>

<footer>© ২০২৬ · মার্জিনালিয়া · লেখার একটি ঘর</footer>

<script src="data.js"></script>
<script>
  const grid = document.getElementById('category-grid');
  CATEGORIES.forEach(cat => {
    const count = PIECES.filter(p => p.category === cat.slug).length;
    const card = document.createElement('a');
    card.className = 'category-card';
    card.href = `category.html?cat=${cat.slug}`;
    card.innerHTML = `
      <div class="category-name">${cat.name}</div>
      <div class="category-count">${count} টি লেখা</div>
    `;
    grid.appendChild(card);
  });
</script>

</body>
</html>
